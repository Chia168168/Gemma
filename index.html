<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Video Editor</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- FFmpeg WASM -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Browser Video Editor</h1>
            <p>Edit videos directly in your browser using FFmpeg WASM</p>
        </header>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Drag & drop your video here or click to browse</p>
                <input type="file" id="videoInput" accept="video/*" hidden>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <p id="ffmpegStatus" style="color: #7f8c8d; font-size: 0.9rem;">Initializing video processor...</p>
            </div>
        </div>

        <!-- 其餘 HTML 內容保持不變（editorSection、processingModal、outputSection） -->
        <!-- 為了簡潔這裡省略中間大段相同的 HTML，請直接複製你原本 index.html 的內容進來 -->

        <div id="editorSection" class="editor-section" style="display: none;">
            <!-- ... 你原本的 editorSection 全部內容 ... -->
        </div>

        <div id="processingModal" class="modal" style="display: none;">
            <!-- ... 你原本的 processingModal ... -->
        </div>

        <div id="outputSection" class="output-section" style="display: none;">
            <!-- ... 你原本的 outputSection ... -->
        </div>
    </div>

    <footer>
        <p>Powered by FFmpeg WASM • All processing happens in your browser</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
